# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for Job Recommendation App
# Enable when you add a domain — serves as SSL terminator + proxy to port 3000
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zone (protect against brute-force / DDoS)
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;          # Replace with your domain, e.g.: yourdomain.com www.yourdomain.com

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://nextjs-app:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /public/ {
        proxy_pass http://nextjs-app:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Health check endpoint (bypass rate limiting)
    location /api/health {
        proxy_pass http://nextjs-app:3000;
    }

    # All other requests — proxy to Next.js with rate limiting
    location / {
        limit_req zone=app_limit burst=50 nodelay;

        proxy_pass         http://nextjs-app:3000;
        proxy_http_version 1.1;

        # WebSocket support (needed for Next.js HMR and future WS features)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
    }

    # ── SSL (uncomment after obtaining certs via Certbot) ──────────────────
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
}

