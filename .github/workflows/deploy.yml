name: 🚀 Deploy to EC2

on:
  push:
    branches: [main]
  # Allow manual re-deploy from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Job 1: Lint & type-check before deploying ──────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        # next lint is removed in Next.js 16 — run eslint directly instead
        run: npx eslint src/

      - name: Generate route types
        # Required before tsc in Next.js 16 CI (next typegen replaces next build for type gen)
        run: npx next typegen

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 2: Deploy to EC2 (only runs if validate passes) ────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate          # Only deploy if lint + type-check passes
    environment: production  # Requires manual approval in GitHub if configured
    permissions:
      contents: read
      packages: write        # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/bharatsirvi/job-search-automation:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  300s        # Allow up to 5 min for the Docker pull
          script: |
            set -euo pipefail   # Exit on error, undefined vars, pipe failures

            APP_DIR="/home/ubuntu/job-recommendation"

            echo "──────────────────────────────────────────"
            echo "📁 Navigating to project directory"
            echo "──────────────────────────────────────────"
            cd "$APP_DIR"



            # Automatically clean up dangling images occasionally
            sudo docker image prune -f

            echo "──────────────────────────────────────────"
            echo "🔐 Authenticating with GHCR on EC2"
            echo "──────────────────────────────────────────"
            # Use the temporary GITHUB_TOKEN to pull the private image securely
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "──────────────────────────────────────────"
            echo "🔄 Pulling latest image and restarting container"
            echo "──────────────────────────────────────────"
            # Stop and remove the old container if it's running
            sudo docker rm -f job-recommendation-app || true
            
            # Pull the new image
            sudo docker pull ghcr.io/bharatsirvi/job-search-automation:latest

            # Run the container with all necessary settings
            sudo docker run -d \
              --name job-recommendation-app \
              -p 3000:3000 \
              --env-file /home/ubuntu/job-recommendation/.env.local \
              --restart always \
              --memory=512m \
              ghcr.io/bharatsirvi/job-search-automation:latest

            echo "──────────────────────────────────────────"
            echo "👋 Logging out of GHCR"
            echo "──────────────────────────────────────────"
            sudo docker logout ghcr.io

            echo "──────────────────────────────────────────"
            echo "🏥 Waiting for health check to pass..."
            echo "──────────────────────────────────────────"
            # Poll /api/health for up to 60 seconds
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "✅ App is healthy!"
                break
              fi
              echo "⏳ Attempt $i/12 — waiting 5s..."
              sleep 5
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                sudo docker logs --tail=50 job-recommendation-app
                exit 1
              fi
            done

            echo "──────────────────────────────────────────"
            echo "📊 Container status:"
            sudo docker ps | grep job-recommendation-app
            echo "✅ Deployment complete!"
            echo "──────────────────────────────────────────"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check the logs above."
          # Plug in Slack / Discord / email webhook here if needed:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ JobsAI deployment FAILED on EC2"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
