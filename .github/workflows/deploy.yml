name: 🚀 Deploy to EC2

on:
  push:
    branches: [main]
  # Allow manual re-deploy from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Job 1: Lint & type-check before deploying ──────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 2: Deploy to EC2 (only runs if validate passes) ────────────────
  deploy:
    name: 🚢 Deploy
    runs-on: ubuntu-latest
    needs: validate          # Only deploy if lint + type-check passes
    environment: production  # Requires manual approval in GitHub if configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  300s        # Allow up to 5 min for the Docker build
          script: |
            set -euo pipefail   # Exit on error, undefined vars, pipe failures

            APP_DIR="/home/ubuntu/job-recommendation"

            echo "──────────────────────────────────────────"
            echo "📁 Navigating to project directory"
            echo "──────────────────────────────────────────"
            cd "$APP_DIR"

            echo "──────────────────────────────────────────"
            echo "📥 Pulling latest code from main"
            echo "──────────────────────────────────────────"
            git fetch --all
            git reset --hard origin/main

            echo "──────────────────────────────────────────"
            echo "🏗️  Building Docker image (no cache)"
            echo "──────────────────────────────────────────"
            docker compose build --no-cache

            echo "──────────────────────────────────────────"
            echo "🔄 Restarting containers (zero-downtime)"
            echo "──────────────────────────────────────────"
            docker compose up -d --remove-orphans

            echo "──────────────────────────────────────────"
            echo "🧹 Cleaning up dangling images"
            echo "──────────────────────────────────────────"
            docker image prune -f

            echo "──────────────────────────────────────────"
            echo "🏥 Waiting for health check to pass..."
            echo "──────────────────────────────────────────"
            # Poll /api/health for up to 60 seconds
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "✅ App is healthy!"
                break
              fi
              echo "⏳ Attempt $i/12 — waiting 5s..."
              sleep 5
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker compose logs --tail=50 nextjs-app
                exit 1
              fi
            done

            echo "──────────────────────────────────────────"
            echo "📊 Container status:"
            docker compose ps
            echo "✅ Deployment complete!"
            echo "──────────────────────────────────────────"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check the logs above."
          # Plug in Slack / Discord / email webhook here if needed:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ JobsAI deployment FAILED on EC2"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
